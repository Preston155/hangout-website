<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#060a12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Liberty County CAD</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/cad.css?v=3" />
  </head>
  <body>
    <div class="desktop-update hidden" id="desktopUpdateBanner" role="status">
      <div class="desktop-update__content">
        <span class="desktop-update__icon">⬆</span>
        <div class="desktop-update__text">
          <strong class="desktop-update__title">Desktop update available</strong>
          <span class="desktop-update__message">A new installer is ready.</span>
        </div>
        <a class="btn btn--primary desktop-update__download" href="downloads/Discord-Remake-Setup.exe" download>Download</a>
        <button class="desktop-update__dismiss" type="button" aria-label="Dismiss">✕</button>
      </div>
    </div>

    <div id="app"></div>
    <div class="toast-stack" id="toastStack"></div>

    <script src="js/desktop-update.js?v=3"></script>
    <script src="js/api.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
  </body>
</html>
