  <main id="app"></main><div id="toast" class="toast"></div>
  <script>
    const $=s=>document.querySelector(s); const app=$('#app');
    const defaultProfile={username:'preston',displayName:'Preston',headline:'Founder • creator hub • updates',bio:'Clean creator profile with links, media, cards, and analytics.',avatar:'',banner:'',badges:['Founder','Verified','Early access'],cards:[{type:'link',title:'Discord community',body:'Join the PrestonHQ community.',url:'#',button:'Open',layout:'split',privacy:'public'},{type:'video',title:'Latest upload',body:'Feature video or MP4 preview.',url:'#',media:'',button:'Watch',layout:'stack',animation:'float',privacy:'public'},{type:'link',title:'Roblox experiences',body:'Showcase games, groups, and profiles.',url:'#',button:'View',layout:'split',privacy:'public'},{type:'music',title:'Music player',body:'Loop tracks with browser controls.',url:'#',media:'',button:'Play',layout:'center',privacy:'public'}],views:12840};
    const getUsers=()=>JSON.parse(localStorage.phqUsers||'{}'); const setUsers=u=>localStorage.phqUsers=JSON.stringify(u); const current=()=>localStorage.phqCurrent||'';
    const profileOf=u=>getUsers()[u]?.profile || (u==='preston'?defaultProfile:null);
    function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}
    function go(path){history.pushState(null,'',path);route()} window.addEventListener('popstate',route);
    function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
    function cardBackground(c){if(c.bgType==='image'&&c.bg)return `linear-gradient(135deg,rgba(0,0,0,.18),rgba(0,0,0,.58)),url('${esc(c.bg)}')`;if(c.bgType==='gif'&&c.bg)return `linear-gradient(135deg,rgba(0,0,0,.18),rgba(0,0,0,.58)),url('${esc(c.bg)}')`;if(c.gradient)return esc(c.gradient);return 'linear-gradient(135deg,rgba(185,92,255,.24),rgba(111,117,255,.13),rgba(255,255,255,.045))'}
    function cardHtml(c,i){if(c.privacy==='private')return '';const type=(c.type||'link').toLowerCase();const media=c.media||c.url||'';const style=`--card-bg:${cardBackground(c)};--card-color:${esc(c.color||'#ffffff')}`;let mediaHtml=c.bgType==='video'&&c.bg?`<video class="card-bg-video" src="${esc(c.bg)}" autoplay muted loop playsinline></video>`:'';if(type==='video'&&media)mediaHtml=`<video src="${esc(media)}" controls playsinline loop></video>`;if(type==='music'&&media)mediaHtml=`<audio src="${esc(media)}" controls ${c.loop?'loop':''}></audio>`;if(type==='image'&&media)mediaHtml=`<img src="${esc(media)}" alt="${esc(c.title||'card image')}">`;if(type==='embed'&&media)mediaHtml=`<iframe src="${esc(media)}" loading="lazy" allow="autoplay; encrypted-media; picture-in-picture"></iframe>`;const inner=`<div><div class="card-title">${esc(c.title||'Untitled card')}</div>${c.body?`<div class="card-body">${esc(c.body)}</div>`:''}${mediaHtml}${c.button?`<span class="card-button">${esc(c.button)}</span>`:''}</div>`;const cls=`custom-card ${esc(c.layout||'stack')} ${esc(c.animation||'')}`;return c.url&&type==='link'?`<a class="${cls}" style="${style}" href="${esc(c.url)}" target="_blank" onclick="trackClick(${i})">${inner}</a>`:`<div class="${cls}" style="${style}">${inner}</div>`}
    function profileCard(p=defaultProfile){const visible=(p.cards||[]).filter(c=>c.privacy!=='private');return `<article class="profile"><div class="banner" style="${p.banner?`background-image:linear-gradient(140deg,rgba(7,8,13,.12),rgba(7,8,13,.6)),url('${esc(p.banner)}')`:''}"></div><div class="body">${p.avatar?`<img class="avatar" src="${esc(p.avatar)}">`:`<div class="avatar">${esc((p.displayName||p.username||'P')[0]).toUpperCase()}</div>`}<div class="row"><div><h2>@${esc(p.username)}</h2><p class="muted">${esc(p.headline||'Creator profile')}</p></div><span class="privacy-pill">${esc(p.privacy||'public')}</span></div><p class="muted">${esc(p.bio||'')}</p>${p.musicUrl?`<audio src="${esc(p.musicUrl)}" controls ${p.musicLoop?'loop':''} ${p.musicAutoplay?'autoplay':''}></audio>`:''}<div class="badges">${(p.badges||[]).map(b=>`<span class="badge">${esc(b)}</span>`).join('')}</div>${visible.map(cardHtml).join('')}<div class="mini-analytics"><div class="mini"><b>${Number(p.views||0).toLocaleString()}</b><small>views</small></div><div class="mini"><b>${visible.length}</b><small>cards</small></div><div class="mini"><b>${esc(p.privacy||'public')}</b><small>privacy</small></div></div></div></article>`}
    function home(){app.innerHTML=`<section class="hero wrap"><div class="kicker"><i class="dot"></i> Modern profile pages and creator tools</div><h1>Everything you are, right here.</h1><p class="lead">PrestonHQ Profiles is your home for clean link-in-bio pages, creator cards, media embeds, profile analytics, and custom public pages.</p><div class="actions"><button class="button" onclick="go('/signup')">Sign Up for Free</button><button class="button secondary" onclick="go('/@preston')">View Example</button></div><div class="stage"><div class="dash-preview"><div class="dash-inner"><div class="dash-side"><b>Welcome back</b><div class="side-pill"></div><div class="side-pill"></div><div class="side-pill"></div><div class="side-pill"></div></div><div class="dash-main"><div class="dash-title">Account Overview</div><div class="dash-stats"><div class="stat">Username<br><b>$</b></div><div class="stat">Alias<br><b>hris</b></div><div class="stat">UID<br><b>1</b></div><div class="stat">Views<br><b>4,891</b></div></div><div class="chart"></div><div class="manage"><div></div><div></div><div></div></div></div></div></div><div class="profiles"><div class="phone p1"><div class="phone-content"><div class="phone-avatar">A</div><h3>Azren</h3><p>GFX Artist</p><div class="phone-card"></div></div></div><div class="phone p2"><div class="phone-content"><div class="phone-avatar">V</div><h3>vue</h3><p>welcome to my page</p><div class="phone-card"></div></div></div><div class="phone p3"><div class="phone-content"><div class="phone-avatar">P</div><h3>Preston</h3><p>PrestonHQ on top</p><div class="phone-card"></div></div></div></div></div></section><section id="features" class="section wrap"><div class="section-head"><div><div class="eyebrow">Features</div><h2>Everything your profile needs.</h2></div><p>No cluttered builder. Just the blocks creators need to make a profile feel finished.</p></div><div class="grid features"><div class="feature"><b>Custom cards</b><span>Links, videos, music, socials, FAQs, countdowns, donations, galleries, and embeds.</span></div><div class="feature"><b>Media profiles</b><span>Avatars, banners, backgrounds, music, YouTube, TikTok, Twitch, Roblox.</span></div><div class="feature"><b>Analytics</b><span>Track profile views, clicks, devices, sources, and card performance.</span></div><div class="feature"><b>Safety controls</b><span>Reports, safe embeds, admin review tools, and moderation actions.</span></div></div></section><section class="section wrap grid split"><div class="panel"><div class="eyebrow">User platform</div><h4>Every user owns their profile.</h4><p>Create an account, claim a username, edit your page, add cards, and share it.</p><div class="check"><div>Private dashboard per user</div><div>Unique profile URLs</div><div>Live editor preview</div></div></div><div class="panel"><div class="eyebrow">Builder</div><h4>Make it yours in minutes.</h4><p>Use the live builder to test the flow right now. Real database accounts are ready in the Next.js app.</p><div class="check"><div>Signup and login</div><div>Save profile locally</div><div>Add and delete cards</div></div></div></section>`}
    function auth(mode){app.innerHTML=`<section class="formpage"><form class="formbox" id="auth"><div class="eyebrow">${mode==='signup'?'Create account':'Welcome back'}</div><h1>${mode==='signup'?'Claim your username':'Login'}</h1><p class="muted">${mode==='signup'?'Create your profile and start editing right away.':'Open your dashboard and keep building.'}</p>${mode==='signup'?'<label class="field">Username<input name="username" required minlength="3" pattern="[A-Za-z0-9_.-]+"></label>':''}<label class="field">Email<input name="email" type="email" required></label><label class="field">Password<input name="password" type="password" required minlength="6"></label><button class="button" style="margin-top:18px;width:100%">${mode==='signup'?'Create profile':'Login'}</button><button type="button" class="button secondary" style="margin-top:10px;width:100%" onclick="go('${mode==='signup'?'/login':'/signup'}')">${mode==='signup'?'I already have an account':'Create an account'}</button></form></section>`;$('#auth').onsubmit=e=>{e.preventDefault();const f=Object.fromEntries(new FormData(e.target));const users=getUsers();let username=(f.username||Object.values(users).find(u=>u.email===f.email)?.username||'').toLowerCase();if(mode==='signup'){if(users[username])return toast('Username already taken');users[username]={username,email:f.email,password:f.password,profile:{...defaultProfile,username,displayName:username,headline:'New PrestonHQ creator',bio:'Building my creator profile on PrestonHQ.',privacy:'public',cards:[{type:'link',title:'My first custom card',body:'Edit me in the dashboard.',url:'#',button:'Open',layout:'stack',privacy:'public'}],views:0}};setUsers(users)}else{const found=Object.values(users).find(u=>u.email===f.email&&u.password===f.password);if(!found)return toast('Invalid login. Sign up first.');username=found.username}localStorage.phqCurrent=username;toast('Signed in');go('/dashboard')}}
    function dashboard(){const u=current(); if(!u)return go('/login'); const users=getUsers(); const p=users[u].profile; app.innerHTML=`<section class="wrap dash"><aside class="sidebar panel"><div class="eyebrow">Dashboard</div><h2>@${esc(p.username)}</h2><p class="muted">Edit, preview, and publish your profile.</p><div class="tabs"><button class="button secondary" onclick="go('/@${esc(p.username)}')">View public page</button><button class="button secondary" onclick="logout()">Logout</button></div></aside><section class="editor"><div class="formbox"><div class="eyebrow">Profile editor</div><h1>Edit profile</h1><label class="field">Display name<input id="displayName" value="${esc(p.displayName||p.username)}"></label><label class="field">Headline<input id="headline" value="${esc(p.headline||'')}"></label><label class="field">Bio<textarea id="bio">${esc(p.bio||'')}</textarea></label><label class="field">Avatar image URL<input id="avatar" value="${esc(p.avatar||'')}"></label><label class="field">Banner image URL<input id="banner" value="${esc(p.banner||'')}"></label><label class="field">Music URL<input id="musicUrl" value="${esc(p.musicUrl||'')}"></label><label class="field">Profile privacy<select class="select" id="profilePrivacy"><option ${p.privacy==='public'?'selected':''}>public</option><option ${p.privacy==='unlisted'?'selected':''}>unlisted</option><option ${p.privacy==='private'?'selected':''}>private</option></select></label><div class="card-tools"><label><input type="checkbox" id="musicLoop" ${p.musicLoop?'checked':''}> Loop music</label><label><input type="checkbox" id="musicAutoplay" ${p.musicAutoplay?'checked':''}> Autoplay if allowed</label></div><button class="button" onclick="saveProfile()">Save profile</button></div><div class="formbox"><div class="row"><div><div class="eyebrow">Custom cards</div><h2>Unlimited cards</h2><p class="muted">Drag cards to reorder. Add backgrounds, media, gradients, effects, privacy, and buttons.</p></div><button class="button" onclick="addCard()">Add card</button></div><div class="cards-list" id="cardsEditor">${cardsEditor(p)}</div></div></section><aside>${profileCard(p)}</aside></section>`}
    function cardsEditor(p){return (p.cards||[]).map((c,i)=>`<div class="card-edit" draggable="true" ondragstart="dragCard(event,${i})" ondragover="event.preventDefault()" ondrop="dropCard(event,${i})"><div class="row"><b>Card ${i+1}</b><span class="privacy-pill">${esc(c.privacy||'public')}</span></div><label class="field">Type<select class="select" data-card-type="${i}">${['link','text','image','video','music','embed'].map(t=>`<option ${c.type===t?'selected':''}>${t}</option>`).join('')}</select></label><label class="field">Title<input data-card-title="${i}" value="${esc(c.title||'')}"></label><label class="field">Body text<textarea data-card-body="${i}">${esc(c.body||'')}</textarea></label><label class="field">URL / click target<input data-card-url="${i}" value="${esc(c.url||'')}"></label><label class="field">Media URL / embed URL<input data-card-media="${i}" value="${esc(c.media||'')}"></label><div class="grid" style="grid-template-columns:160px 1fr"><label class="field">BG type<select class="select" data-card-bgType="${i}"><option ${c.bgType==='image'?'selected':''}>image</option><option ${c.bgType==='gif'?'selected':''}>gif</option><option ${c.bgType==='video'?'selected':''}>video</option><option ${c.bgType==='gradient'?'selected':''}>gradient</option></select></label><label class="field">Background image, GIF, or video URL<input data-card-bg="${i}" value="${esc(c.bg||'')}"></label></div><label class="field">Gradient CSS<input data-card-gradient="${i}" value="${esc(c.gradient||'')}"></label><div class="grid" style="grid-template-columns:repeat(2,1fr)"><label class="field">Text color<input data-card-color="${i}" value="${esc(c.color||'#ffffff')}"></label><label class="field">Button text<input data-card-button="${i}" value="${esc(c.button||'')}"></label></div><div class="grid" style="grid-template-columns:repeat(3,1fr)"><label class="field">Layout<select class="select" data-card-layout="${i}"><option ${c.layout==='stack'?'selected':''}>stack</option><option ${c.layout==='center'?'selected':''}>center</option><option ${c.layout==='split'?'selected':''}>split</option><option ${c.layout==='compact'?'selected':''}>compact</option></select></label><label class="field">Animation<select class="select" data-card-animation="${i}"><option value="" ${!c.animation?'selected':''}>none</option><option ${c.animation==='float'?'selected':''}>float</option><option ${c.animation==='pulse'?'selected':''}>pulse</option></select></label><label class="field">Privacy<select class="select" data-card-privacy="${i}"><option ${c.privacy==='public'?'selected':''}>public</option><option ${c.privacy==='unlisted'?'selected':''}>unlisted</option><option ${c.privacy==='private'?'selected':''}>private</option></select></label></div><div class="card-tools"><button class="button secondary" onclick="moveCard(${i},-1)">↑</button><button class="button secondary" onclick="moveCard(${i},1)">↓</button><button class="button danger" onclick="deleteCard(${i})">Delete</button></div></div>`).join('')||'<div class="muted">No cards yet.</div>'}
    function saveProfile(){const u=current(),users=getUsers(),p=users[u].profile;p.displayName=$('#displayName').value;p.headline=$('#headline').value;p.bio=$('#bio').value;p.avatar=$('#avatar').value;p.banner=$('#banner').value;p.musicUrl=$('#musicUrl').value;p.musicLoop=$('#musicLoop').checked;p.musicAutoplay=$('#musicAutoplay').checked;p.privacy=$('#profilePrivacy').value;['type','title','body','url','media','bg','bgType','gradient','color','button','layout','animation','privacy'].forEach(k=>document.querySelectorAll(`[data-card-${k}]`).forEach(el=>p.cards[el.dataset['card'+k[0].toUpperCase()+k.slice(1)]][k]=el.value));setUsers(users);toast('Profile saved');dashboard()}
    function addCard(){const users=getUsers(),p=users[current()].profile;p.cards.push({type:'link',title:'New custom card',body:'Add text, media, backgrounds, effects, and buttons.',url:'#',media:'',bg:'',bgType:'gradient',gradient:'linear-gradient(135deg,rgba(185,92,255,.35),rgba(111,117,255,.18))',color:'#ffffff',button:'Open',layout:'stack',animation:'',privacy:'public'});setUsers(users);dashboard()}
    function moveCard(i,dir){const users=getUsers(),p=users[current()].profile,j=i+dir;if(j<0||j>=p.cards.length)return;[p.cards[i],p.cards[j]]=[p.cards[j],p.cards[i]];setUsers(users);dashboard()}
    let draggingCard=null;function dragCard(e,i){draggingCard=i;e.currentTarget.classList.add('dragging')}function dropCard(e,i){const users=getUsers(),p=users[current()].profile;if(draggingCard===null||draggingCard===i)return;const [m]=p.cards.splice(draggingCard,1);p.cards.splice(i,0,m);draggingCard=null;setUsers(users);dashboard()}
    function deleteCard(i){const users=getUsers(),p=users[current()].profile;p.cards.splice(i,1);setUsers(users);dashboard()}
    function trackClick(i){const u=location.pathname.startsWith('/@')?decodeURIComponent(location.pathname.slice(2)):'';const users=getUsers();if(users[u]&&users[u].profile.cards[i]){users[u].profile.cards[i].clicks=(users[u].profile.cards[i].clicks||0)+1;setUsers(users)}}
    function logout(){localStorage.removeItem('phqCurrent');toast('Logged out');go('/')}
    function publicProfile(username){const p=profileOf(username.toLowerCase()); if(p&&p.privacy==='private'&&current()!==username.toLowerCase()){app.innerHTML=`<section class="formpage"><div class="formbox"><h1>Private profile</h1><p class="muted">This creator has made their page private.</p><button class="button" onclick="go('/')">Go home</button></div></section>`;return} if(!p){app.innerHTML=`<section class="formpage"><div class="formbox"><h1>Profile not found</h1><p class="muted">That username is available.</p><button class="button" onclick="go('/signup')">Claim a username</button></div></section>`;return}p.views=(p.views||0)+1;if(username!=='preston'){const users=getUsers();if(users[username]){users[username].profile.views=p.views;setUsers(users)}}app.innerHTML=`<section class="profile-page wrap"><div style="width:min(540px,100%)">${profileCard(p)}<div class="actions"><button class="button" onclick="go('/signup')">Make yours</button><button class="button secondary" onclick="go('/explore')">Explore</button></div></div></section>`}
    function explore(){const users=getUsers();const profiles=[defaultProfile,...Object.values(users).map(u=>u.profile)].filter(p=>p.privacy!=='private'&&p.privacy!=='unlisted');app.innerHTML=`<section class="section wrap"><div class="section-head"><div><div class="eyebrow">Explore</div><h2>Profiles</h2></div><button class="button" onclick="go('/signup')">Create profile</button></div><div class="grid features">${profiles.map(p=>`<div class="feature" onclick="go('/@${esc(p.username)}')" style="cursor:pointer"><b>@${esc(p.username)}</b><span>${esc(p.headline||'Creator profile')}<br><br>${Number(p.views||0).toLocaleString()} views • ${(p.cards||[]).length} cards</span></div>`).join('')}</div></section>`}
    function route(){const path=location.pathname; if(path==='/signup')return auth('signup'); if(path==='/login')return auth('login'); if(path==='/dashboard')return dashboard(); if(path==='/explore')return explore(); if(path.startsWith('/@'))return publicProfile(decodeURIComponent(path.slice(2))); if(path.startsWith('/u/'))return publicProfile(decodeURIComponent(path.slice(3))); return home()}
    document.addEventListener('click',e=>{if(e.target.matches('[data-home-link]')&&location.pathname!=='/'){e.preventDefault();go('/');setTimeout(()=>location.hash='features',30)}}); route();
  </script>
</body>
