<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0c0e"/>
      <stop offset="1" stop-color="#111118"/>
    </linearGradient>
    <radialGradient id="glow-blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 220) rotate(12) scale(420 320)">
      <stop stop-color="#2B7FFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2B7FFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 420) rotate(-18) scale(360 280)">
      <stop stop-color="#B56BFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#B56BFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rgb" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FF3B5C"/>
      <stop offset="0.18" stop-color="#FF8A3D"/>
      <stop offset="0.36" stop-color="#FFE14D"/>
      <stop offset="0.54" stop-color="#3DFF9A"/>
      <stop offset="0.72" stop-color="#2B7FFF"/>
      <stop offset="0.88" stop-color="#B56BFF"/>
      <stop offset="1" stop-color="#FF3B5C"/>
    </linearGradient>
    <linearGradient id="v-metal" x1="120" y1="80" x2="260" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F6FA"/>
      <stop offset="0.45" stop-color="#9AA3B2"/>
      <stop offset="1" stop-color="#D7DEE8"/>
    </linearGradient>
    <linearGradient id="v-accent" x1="220" y1="120" x2="300" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4D94FF"/>
      <stop offset="1" stop-color="#2B7FFF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>
  <rect width="1200" height="630" fill="url(#glow-purple)"/>

  <g opacity="0.35">
    <path d="M0 520H1200" stroke="#ffffff" stroke-opacity="0.06"/>
    <path d="M0 80H1200" stroke="#ffffff" stroke-opacity="0.04"/>
    <path d="M120 0V630M360 0V630M600 0V630M840 0V630M1080 0V630" stroke="#ffffff" stroke-opacity="0.025"/>
  </g>

  <rect x="64" y="64" width="1072" height="502" rx="28" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="64.5" y="64.5" width="1071" height="501" rx="27.5" stroke="url(#rgb)" stroke-opacity="0.35"/>

  <!-- logo mark -->
  <g transform="translate(118 168)">
    <ellipse cx="110" cy="150" rx="90" ry="110" fill="#2B7FFF" fill-opacity="0.18" filter="url(#soft)"/>
    <path d="M58 58 L198 58 L118 292 Z" fill="url(#v-metal)"/>
    <path d="M118 58 L198 58 L158 292 L118 292 Z" fill="url(#v-accent)" fill-opacity="0.95"/>
    <rect x="72" y="228" width="92" height="52" rx="10" fill="#0e0e10"/>
    <text x="118" y="264" text-anchor="middle" fill="#EFeff1" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="700">V2</text>
  </g>

  <!-- copy -->
  <text x="390" y="210" fill="#8B8B96" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="500" letter-spacing="0.08em">CITY OF ANGELS</text>

  <text x="390" y="300" fill="url(#rgb)" font-family="Segoe UI, system-ui, sans-serif" font-size="92" font-weight="700" letter-spacing="-0.03em">Veltrix</text>

  <text x="390" y="365" fill="#EFEFF1" font-family="Segoe UI, system-ui, sans-serif" font-size="34" font-weight="500">Discord bot command reference</text>

  <text x="390" y="420" fill="#8B8B96" font-family="Segoe UI, system-ui, sans-serif" font-size="26" font-weight="400">Slash commands · prefix commands · automated systems</text>

  <!-- chips -->
  <g font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="600">
    <rect x="390" y="458" width="118" height="46" rx="23" fill="#2B7FFF" fill-opacity="0.12" stroke="#2B7FFF" stroke-opacity="0.35"/>
    <text x="449" y="489" text-anchor="middle" fill="#4D94FF">Slash</text>

    <rect x="522" y="458" width="118" height="46" rx="23" fill="#E8B84A" fill-opacity="0.12" stroke="#E8B84A" stroke-opacity="0.35"/>
    <text x="581" y="489" text-anchor="middle" fill="#E8B84A">Prefix</text>

    <rect x="654" y="458" width="132" height="46" rx="23" fill="#3BA55D" fill-opacity="0.12" stroke="#3BA55D" stroke-opacity="0.35"/>
    <text x="720" y="489" text-anchor="middle" fill="#3BA55D">Systems</text>
  </g>

  <text x="1120" y="582" text-anchor="end" fill="#5C5C66" font-family="Segoe UI, system-ui, sans-serif" font-size="24" font-weight="500">prestonhq.com</text>

  <rect x="0" y="626" width="1200" height="4" fill="url(#rgb)"/>
</svg>
