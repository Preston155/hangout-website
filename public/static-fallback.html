    const defaults={user:{name:'Preston',id:'805501165981794305'},bot:{name:'Veltrix',appId:'bot3',pm2:'bot3',status:'online',source:'/root/bots/bot3'},server:'City of Angels',commands:[{name:'setup',description:'Create or update the safe Veltrix channel and role layout.',enabled:true,cooldown:15,permission:'Administrator',role:'Head Administrator',response:'Setup task completed.',embed:{title:'Veltrix Setup Complete',description:'Server layout and permissions were synced safely.',color:'#5865f2',fields:[['Scope','channels / roles / permissions'],['Status','Ready']]}},{name:'ticket-panel',description:'Post the advanced Veltrix ticket panel.',enabled:true,cooldown:10,permission:'Manage Server',role:'Staff',response:'Ticket panel posted.',embed:{title:'Support Center',description:'Choose a ticket category and staff will respond.',color:'#22c55e',fields:[['Categories','Support, Reports, Appeals, Partnerships']]}},{name:'counting',description:'Configure, reset, disable, or view counting status.',enabled:true,cooldown:5,permission:'Manage Server',role:'Management',response:'Counting system updated.',embed:{title:'Counting System',description:'Counting channel settings were updated.',color:'#2dd4bf',fields:[['Subcommands','setup, status, reset, disable']]}},{name:'shift',description:'Start/end shifts and view staff points leaderboard.',enabled:true,cooldown:5,permission:'Staff',role:'Staff Team',response:'Shift updated.',embed:{title:'Staff Shift',description:'Staff shift status changed.',color:'#a855f7',fields:[['Actions','start, end, status, leaderboard, addpoints']]}},{name:'giveaway',description:'Start, edit, reroll, pause, resume, end, delete, list, and proof giveaways.',enabled:true,cooldown:20,permission:'Manage Events',role:'Events Team',response:'Giveaway action completed.',embed:{title:'Giveaway System',description:'Advanced giveaway controls for Veltrix.',color:'#f59e0b',fields:[['Controls','start, reroll, proof, list, end']]}},{name:'session',description:'Manage ERLC session votes, starts, attendance, and roster.',enabled:true,cooldown:10,permission:'Staff',role:'Session Host',response:'Session command completed.',embed:{title:'Session System',description:'Session tools for City of Angels.',color:'#ef4444',fields:[['Tools','vote, start, end, cancel, status, roster']]}},{name:'birthday',description:'Set and manage birthday announcements.',enabled:true,cooldown:10,permission:'Everyone',role:'Member',response:'Birthday saved.',embed:{title:'Birthday System',description:'Birthday reminders and announcements.',color:'#ec4899',fields:[['Status','Enabled']]}},{name:'server-status',description:'Show server and community status.',enabled:true,cooldown:10,permission:'Everyone',role:'Member',response:'Status panel sent.',embed:{title:'City of Angels Status',description:'Community, channels, and server details.',color:'#38bdf8',fields:[['Community','Online'],['Details','Synced from Veltrix']]}},{name:'server-roles',description:'Show server roles with pagination.',enabled:true,cooldown:5,permission:'Manage Roles',role:'Staff',response:'Role list sent.',embed:{title:'Server Roles',description:'Paginated role overview.',color:'#64748b',fields:[['Page','1/1']]}},{name:'purge',description:'Bulk delete messages safely.',enabled:true,cooldown:8,permission:'Manage Messages',role:'Moderator',response:'Messages purged.',embed:{title:'Purge Complete',description:'Messages were deleted safely.',color:'#fb7185',fields:[['Amount','{amount}']]}}],logs:[['Veltrix','Connected to PM2 app bot3'],['Sync','10 Veltrix commands loaded'],['Status','Veltrix is online']]};

    function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
    function home(){app.innerHTML=`<section class="hero wrap"><div><div class="kicker"><span class="dot"></span> Discord bot dashboard and command builder</div><h1>Control Veltrix commands, embeds, permissions, logs, and sync from one clean dashboard.</h1><p class="lead">Veltrix is connected to the City of Angels workspace. Build slash commands, preview embeds, control permissions, and sync updates without editing bot files.</p><div class="actions"><button class="button discord" onclick="go('/login')">Login with Discord</button><button class="button secondary" onclick="go('/dashboard')">Open demo dashboard</button></div><div class="proof"><div><b>Veltrix</b>connected bot3</div><div><b>10</b>commands loaded</div><div><b>Online</b>PM2 status</div></div></div><div class="mock"><div class="dash-shot"><div class="dash-head"><span class="status-chip">Veltrix online</span><div class="traffic"><i></i><i></i><i></i></div></div><div class="shot-body"><div class="shot-side"><div class="server-pill"></div><div class="side-line"></div><div class="side-line"></div><div class="side-line"></div></div><div class="shot-main"><div class="stats"><div class="stat"><b>28</b><span>commands</span></div><div class="stat"><b>4</b><span>servers</span></div><div class="stat"><b>99%</b><span>uptime</span></div><div class="stat"><b>Live</b><span>sync</span></div></div><div class="builder-preview"><div class="code-card"><b>/giveaway start</b><div class="code-line"></div><div class="code-line"></div><div class="code-line"></div><div class="code-line"></div></div><div class="discord-card"><h3>🎉 Giveaway</h3><p>Prize: Nitro<br>Winners: 1<br>Ends: 24h</p></div></div></div></div></div><div class="float-card"><span class="pill">Veltrix workspace</span><h3>City of Angels</h3><p class="lead" style="font-size:14px">Commands, sessions, tickets, giveaways, counting, and staff shifts loaded.</p></div></div></section><section class="section wrap"><div class="section-head"><div><div class="eyebrow">Features</div><h2>Everything for bot control.</h2></div><p>A cleaner control panel for command creation, embeds, logs, roles, channels, templates, and syncing.</p></div><div class="grid features">${['Discord Login','Bot Connect','Server Selector','Slash Builder','Embed Builder','Permissions','Cooldowns','Logs'].map(x=>`<div class="feature"><b>${x}</b><span>Designed for fast setup and polished server management.</span></div>`).join('')}</div></section>`}
    function login(){app.innerHTML=`<section class="section wrap"><div class="panel" style="max-width:560px;margin:auto"><div class="eyebrow">Discord OAuth</div><h2>Login with Discord</h2><p>Demo mode signs you in locally. The production Next.js app will use real Discord OAuth.</p><button class="button discord" onclick="demoLogin()">Continue with Discord</button></div></section>`}
    function demoLogin(){const s=state();s.user={name:'Preston',id:'805501165981794305'};s.logs.unshift(['Auth','Discord login completed']);save(s);toast('Logged in with Discord');go('/dashboard')}
    function layout(content,active='overview'){const s=state();app.innerHTML=`<section class="app"><aside class="sidebar"><div class="server-card"><div style="display:flex;gap:10px;align-items:center"><div class="veltrix-logo">V</div><div><b>${esc(s.bot?.name||'Veltrix')}</b><p class="muted">${esc(s.server)} • ${esc(s.bot?.status||'online')}</p></div></div></div><div class="icon-nav">${['overview','commands','builder','embeds','templates','permissions','logs','settings'].map(x=>{const icons={overview:'⌘',commands:'⚡',builder:'🧩',embeds:'▣',templates:'✦',permissions:'🔐',logs:'◷',settings:'⚙'};return `<button data-icon="${icons[x]}" class="nav-btn ${active===x?'active':''}" onclick="go('/${x==='overview'?'dashboard':x}')">${x[0].toUpperCase()+x.slice(1)}</button>`}).join('')}</div></aside><main class="main">${content}</main></section>`}
    function dashboard(){const s=state();layout(`<div class="main-head"><div><div class="eyebrow">Veltrix Control Panel</div><h2>${esc(s.server)}</h2><p class="muted">Manage Veltrix commands, templates, embeds, permissions, and sync status.</p></div><div style="display:flex;gap:10px;flex-wrap:wrap"><span class="status-chip">Connected</span><button class="button" onclick="syncCommands()">Sync Veltrix</button></div></div><div class="grid stats"><div class="stat"><b>${s.commands.length}</b><span>commands</span></div><div class="stat"><b>${s.commands.filter(c=>c.enabled).length}</b><span>enabled</span></div><div class="stat"><b>${s.bot?.status||'online'}</b><span>bot status</span></div><div class="stat"><b>${s.logs.length}</b><span>logs</span></div></div><div class="dashboard-grid" style="margin-top:16px"><div class="bot-widget"><div class="bot-orb">V</div><div class="panel"><h3>Veltrix live status</h3><p class="muted">PM2 app bot3 • City of Angels • command bridge ready</p></div></div><aside class="activity-panel"><div class="eyebrow">Recent activity</div>${s.logs.slice(0,5).map(l=>`<div class="activity-item"><i class="activity-dot"></i><div><b>${esc(l[0])}</b><p class="muted" style="margin:3px 0 0">${esc(l[1])}</p></div></div>`).join('')}</aside></div><section class="section" style="padding:20px 0"><div class="panel"><h3>Veltrix bot connection</h3><p class="muted">Veltrix is connected from the VPS workspace. Real Discord publishing requires the backend API bridge, but this dashboard is wired to the Veltrix workspace defaults.</p><div class="formgrid"><label class="field">Bot name<input id="botName" value="${esc(s.bot?.name||'Veltrix')}"></label><label class="field">Application ID<input id="appId" value="${esc(s.bot?.appId||'')}"></label></div><button class="button" onclick="connectBot()">Save bot</button></div><div class="workspace-grid"><div class="sync-card"><h3>Veltrix sync bridge</h3><p class="muted">Connected to VPS source /root/bots/bot3. Website changes are staged here for the command sync bridge.</p></div><div class="sync-card" style="display:flex;align-items:center;gap:16px"><div class="metric-ring">86%</div><div><b>Command health</b><p class="muted">10 loaded • 10 enabled-ready • 0 errors</p></div></div></div></section>`, 'overview')}
    function commandCategory(c){const n=c.name.toLowerCase();if(['ban','purge','setup','server-roles'].some(x=>n.includes(x)))return 'Moderation';if(n.includes('ticket'))return 'Tickets';if(n.includes('giveaway'))return 'Fun';return 'Utility'}
    function commands(){const s=state();const cats=['All','Moderation','Tickets','Fun','Utility'];layout(`<div class="main-head"><div><div class="eyebrow">Commands</div><h2>Slash command center</h2><p class="muted">Search, filter, enable, disable, and open builders for Veltrix commands.</p></div><button class="button" onclick="newCommandFlow()">New command</button></div><div class="toolbar"><label class="searchbar">⌕<input id="cmdSearch" placeholder="Search commands, roles, permissions..." oninput="renderCommandCards()"></label><div class="filter-pills">${cats.map((c,i)=>`<button class="${i===0?'active':''}" onclick="setFilter(this,'${c}')">${c}</button>`).join('')}</div></div><div class="command-grid" id="commandGrid"></div>`, 'commands');window.cmdFilter='All';renderCommandCards()}
    function builder(i=0){const s=state(),c=s.commands[i]||s.commands[0];layout(`<div class="main-head"><div><div class="eyebrow">Command Builder</div><h2>/${esc(c.name)}</h2></div><button class="button" onclick="saveCommand(${i})">Publish update</button></div><div class="grid" style="grid-template-columns:1fr 360px"><div class="panel"><div class="formgrid"><label class="field">Command name<input id="cmdName" value="${esc(c.name)}"></label><label class="field">Description<input id="cmdDesc" value="${esc(c.description)}"></label><label class="field">Permission<select id="cmdPerm"><option>${esc(c.permission)}</option><option>Everyone</option><option>Manage Server</option><option>Administrator</option><option>Ban Members</option></select></label><label class="field">Allowed role<input id="cmdRole" value="${esc(c.role)}"></label><label class="field">Cooldown seconds<input id="cmdCooldown" type="number" value="${esc(c.cooldown)}"></label><label class="field">Response text<input id="cmdResponse" value="${esc(c.response)}"></label></div></div><div class="embed-preview"><div class="discord-card"><h3>/${esc(c.name)}</h3><p>${esc(c.description)}</p><small>Permission: ${esc(c.permission)} • Cooldown: ${esc(c.cooldown)}s</small></div></div></div>`, 'builder')}
    function embeds(){const s=state(),c=s.commands[0],e=c.embed;layout(`<div class="main-head"><div><div class="eyebrow">Embed Builder</div><h2>Live Discord preview</h2></div><button class="button" onclick="saveEmbed()">Save embed</button></div><div class="grid" style="grid-template-columns:1fr 420px"><div class="panel"><label class="field">Title<input id="embedTitle" value="${esc(e.title)}"></label><label class="field">Description<textarea id="embedDesc">${esc(e.description)}</textarea></label><label class="field">Color<input id="embedColor" value="${esc(e.color)}"></label><label class="field">Image URL<input id="embedImage" value="${esc(e.image||'')}"></label><label class="field">Button label<input id="embedButton" value="${esc(e.button||'Open')}"></label></div><div class="embed-preview"><div class="embed" style="--embed-color:${esc(e.color)}"><h3>${esc(e.title)}</h3><p>${esc(e.description)}</p>${(e.fields||[]).map(f=>`<div class="embed-field"><b>${esc(f[0])}</b><br><small>${esc(f[1])}</small></div>`).join('')}</div></div></div>`, 'embeds')}
    function templates(){const list=['Veltrix Setup','Tickets','Counting','Staff Shifts','Giveaways','Sessions','Birthdays','Logging'];layout(`<div class="main-head"><div><div class="eyebrow">Templates</div><h2>Command templates</h2></div></div><div class="templates">${list.map(t=>`<div class="template" onclick="addTemplate('${t}')"><b>${t}</b><p class="muted">Add a ready-made ${t.toLowerCase()} command setup.</p></div>`).join('')}</div>`, 'templates')}
    function permissions(){layout(`<div class="main-head"><div><div class="eyebrow">Permissions</div><h2>Roles & channels</h2></div></div><div class="panel"><div class="formgrid"><label class="field">Default command role<input value="Moderator"></label><label class="field">Log channel<input value="#bot-logs"></label><label class="field">Disabled channels<input value="#general, #media"></label><label class="field">Admin bypass role<input value="Administrator"></label></div></div>`, 'permissions')}
    function logs(){const s=state();layout(`<div class="main-head"><div><div class="eyebrow">Logs</div><h2>Bot activity</h2></div><button class="button secondary" onclick="clearLogs()">Clear logs</button></div><div class="grid">${s.logs.map(l=>`<div class="log-row"><span><b>${esc(l[0])}</b> ${esc(l[1])}</span><span>${new Date().toLocaleTimeString()}</span></div>`).join('')}</div>`, 'logs')}
    function settings(){layout(`<div class="main-head"><div><div class="eyebrow">Settings</div><h2>Workspace settings</h2></div></div><div class="panel"><p class="muted">Production setup will store bot tokens encrypted, use Discord OAuth, and publish commands through the Discord API.</p></div>`, 'settings')}
    function connectBot(){const s=state();s.bot={name:$('#botName').value,appId:$('#appId').value};s.logs.unshift(['Bot','Bot connection saved']);save(s);toast('Bot saved')}
    function syncCommands(){const s=state();s.logs.unshift(['Sync',`${s.commands.length} commands synced to ${s.bot?.name||'demo bot'}`]);save(s);toast('Commands synced')}
    function toggleCommand(i){const s=state();s.commands[i].enabled=!s.commands[i].enabled;s.logs.unshift(['Command',`/${s.commands[i].name} ${s.commands[i].enabled?'enabled':'disabled'}`]);save(s);commands()}
    function setFilter(btn,cat){document.querySelectorAll('.filter-pills button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');window.cmdFilter=cat;renderCommandCards()}
    function renderCommandCards(){const s=state();const q=($('#cmdSearch')?.value||'').toLowerCase();const grid=$('#commandGrid');if(!grid)return;grid.innerHTML=s.commands.map((c,i)=>({...c,i,cat:commandCategory(c)})).filter(c=>(!q||[c.name,c.description,c.permission,c.role,c.cat].join(' ').toLowerCase().includes(q))&&(window.cmdFilter==='All'||c.cat===window.cmdFilter)).map(c=>`<article class="command-card" style="--glow:${c.cat==='Moderation'?'rgba(251,113,133,.24)':c.cat==='Tickets'?'rgba(34,197,94,.2)':c.cat==='Fun'?'rgba(245,158,11,.2)':'rgba(88,101,242,.24)'}"><div class="command-top"><div class="cmd-icon">${c.cat==='Moderation'?'🛡️':c.cat==='Tickets'?'🎫':c.cat==='Fun'?'🎉':'⚙️'}</div><div class="toggle ${c.enabled?'on':''}" onclick="toggleCommand(${c.i})"></div></div><h3>/${esc(c.name)}</h3><p>${esc(c.description)}</p><div class="badge-row"><span class="status-badge ${c.enabled?'enabled':'disabled'}">${c.enabled?'Enabled':'Disabled'}</span><span class="status-badge">${esc(c.cat)}</span><span class="status-badge">${esc(c.permission)}</span></div><div class="command-actions"><button class="button secondary" onclick="builder(${c.i})">Edit</button><span class="pill">${esc(c.cooldown)}s cooldown</span></div></article>`).join('')||'<div class="panel">No commands found.</div>'}
    function newCommand(){const s=state();s.commands.push({name:'new-command',description:'A new website-built command.',enabled:true,cooldown:5,permission:'Everyone',role:'',response:'Done.',embed:{title:'New Command',description:'Built from PrestonHQ.',color:'#5865f2',fields:[]}});save(s);builder(s.commands.length-1)}
    function newCommandFlow(){layout(`<div class="main-head"><div><div class="eyebrow">New Command</div><h2>Step-by-step builder</h2><p class="muted">Pick a category, define behavior, preview the embed, then publish to Veltrix.</p></div></div><div class="stepper"><div class="step active">1 Category</div><div class="step">2 Command</div><div class="step">3 Response</div><div class="step">4 Publish</div></div><div class="builder-card"><h3>Choose a command category</h3><div class="cat-select">${['Moderation','Tickets','Fun','Utility'].map(c=>`<div class="cat-card" onclick="createFromCategory('${c}')"><b>${c}</b><p class="muted">Start with a polished ${c.toLowerCase()} command setup.</p></div>`).join('')}</div></div>`, 'builder')}
    function createFromCategory(cat){const map={Moderation:['warn','Warn a member with an optional reason.','Manage Messages'],Tickets:['ticket-create','Create a support ticket panel or ticket action.','Manage Server'],Fun:['poll','Create a community poll or event action.','Everyone'],Utility:['status','Send a useful bot/server status response.','Everyone']};const [name,description,permission]=map[cat];const s=state();s.commands.push({name,description,enabled:true,cooldown:5,permission,role:cat==='Utility'?'Member':'Staff',response:`${cat} command response.`,embed:{title:`${cat} Command`,description, color:'#5865f2',fields:[['Category',cat]]}});s.logs.unshift(['Builder',`${cat} command created`]);save(s);builder(s.commands.length-1)}
    function saveCommand(i){const s=state();s.commands[i]={...s.commands[i],name:$('#cmdName').value,description:$('#cmdDesc').value,permission:$('#cmdPerm').value,role:$('#cmdRole').value,cooldown:$('#cmdCooldown').value,response:$('#cmdResponse').value};s.logs.unshift(['Publish',`/${s.commands[i].name} updated from website`]);save(s);toast('Command published')}
    function saveEmbed(){const s=state();s.commands[0].embed={...s.commands[0].embed,title:$('#embedTitle').value,description:$('#embedDesc').value,color:$('#embedColor').value,image:$('#embedImage').value,button:$('#embedButton').value};s.logs.unshift(['Embed','Embed updated']);save(s);toast('Embed saved');embeds()}
    function addTemplate(t){const s=state();s.commands.push({name:t.toLowerCase().replaceAll(' ','-'),description:`${t} template command.`,enabled:true,cooldown:10,permission:t==='Moderation'?'Ban Members':'Manage Server',role:'Staff',response:`${t} action complete.`,embed:{title:t,description:`${t} system embed.`,color:'#5865f2',fields:[['Status','Ready']]}});s.logs.unshift(['Template',`${t} template added`]);save(s);toast(`${t} template added`)}
    function clearLogs(){const s=state();s.logs=[];save(s);logs()}
    function route(){const p=location.pathname;if(p==='/login')return login();if(p==='/dashboard')return dashboard();if(p==='/commands')return commands();if(p==='/builder')return builder();if(p==='/embeds')return embeds();if(p==='/templates')return templates();if(p==='/permissions')return permissions();if(p==='/logs')return logs();if(p==='/settings')return settings();return home()} route();
  </script>
</body>
</html>
