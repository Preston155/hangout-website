<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#080912">
    <meta name="description" content="PrestonHQ Profiles — a next-gen link-in-bio and profile builder with cyber themes, cards, effects, analytics, and creator tools.">
    <title>PrestonHQ Profiles</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/commands.css?v=100">
  </head>
  <body>
    <div class="cursor-dot" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>

    <header class="site-nav">
      <a class="brand" href="#/">
        <span class="brand-mark">P</span>
        <span><strong>PrestonHQ</strong><small>Profiles</small></span>
      </a>
      <nav>
        <a href="#/explore">Explore</a>
        <a href="#/features">Features</a>
        <a href="#/pricing">Pricing</a>
        <a href="#/login" data-auth-link>Login</a>
        <a class="nav-cta" href="#/signup">Create profile</a>
      </nav>
      <button class="mobile-menu" type="button" aria-label="Open menu">☰</button>
    </header>

    <main id="app" aria-live="polite"></main>

    <template id="landing-template">
      <section class="hero grid-wrap">
        <div class="hero-copy reveal">
          <div class="eyebrow"><span></span> Next-gen link-in-bio profiles</div>
          <h1>Build a profile that feels like a whole universe.</h1>
          <p>PrestonHQ Profiles gives creators glossy cyber pages, unlimited links, custom cards, video backgrounds, music, effects, analytics, and safe embeds — with premium upgrades ready for later.</p>
          <div class="hero-actions">
            <a class="btn primary" href="#/signup">Start free</a>
            <a class="btn ghost" href="#/u/preston">View demo</a>
          </div>
          <div class="trust-row">
            <span>Unlimited links</span><span>Safe embeds</span><span>Free effects</span><span>Mobile ready</span>
          </div>
        </div>
        <div class="hero-preview reveal delay-1" data-demo-profile></div>
      </section>

      <section id="features" class="section">
        <div class="section-head reveal">
          <span class="eyebrow"><span></span> Free builder tools</span>
          <h2>Everything needed to launch a clean creator profile.</h2>
        </div>
        <div class="feature-grid">
          <article class="feature-card reveal"><b>∞</b><h3>Unlimited links</h3><p>Add Discord, YouTube, TikTok, Roblox, Spotify, stores, servers, and anything else.</p></article>
          <article class="feature-card reveal"><b>🎴</b><h3>Custom cards</h3><p>Link cards, videos, music, Discord servers, Roblox profiles, galleries, countdowns, and announcements.</p></article>
          <article class="feature-card reveal"><b>✦</b><h3>Effects system</h3><p>Particles, rain, snow, glow, cursor trails, animated badges, fonts, and video backgrounds.</p></article>
          <article class="feature-card reveal"><b>📈</b><h3>Analytics</h3><p>Track profile views, link clicks, visitors, and basic performance without bloated dashboards.</p></article>
          <article class="feature-card reveal"><b>🔐</b><h3>Secure foundation</h3><p>Server-side auth, hashed passwords, rate limits, safe embeds, moderation states, and upload rules.</p></article>
          <article class="feature-card reveal"><b>💎</b><h3>Paid-ready</h3><p>Premium themes, verified badges, custom domains, private profiles, shop cards, and advanced analytics later.</p></article>
        </div>
      </section>

      <section class="section split-panel reveal">
        <div>
          <span class="eyebrow"><span></span> Live editor</span>
          <h2>Design, drag, preview, publish.</h2>
          <p>Edit profile info, themes, cards, social links, effects, badges, music, cursor, and backgrounds while seeing the profile update live.</p>
        </div>
        <div class="mini-dashboard">
          <div class="dash-chip">Theme: Cyber Glass</div>
          <div class="dash-chip">Effects: Rain + Glow</div>
          <div class="dash-chip">Cards: 8 active</div>
          <div class="dash-chip">Views today: 247</div>
        </div>
      </section>
    </template>

    <template id="auth-template">
      <section class="auth-shell">
        <div class="auth-panel reveal">
          <div class="eyebrow"><span></span> PrestonHQ Profiles</div>
          <h1 data-auth-title>Welcome back</h1>
          <p data-auth-copy>Login to edit your profile, manage cards, and review analytics.</p>
          <form id="authForm" class="stack-form">
            <label>Username<input name="username" autocomplete="username" minlength="3" maxlength="24" required placeholder="preston"></label>
            <label data-email-field>Email<input name="email" autocomplete="email" type="email" placeholder="you@example.com"></label>
            <label>Password<input name="password" autocomplete="current-password" type="password" minlength="8" required placeholder="••••••••"></label>
            <button class="btn primary full" type="submit" data-auth-submit>Login</button>
          </form>
          <p class="form-note" data-auth-switch></p>
        </div>
        <div class="auth-art reveal delay-1">
          <h2>Clean brand. Deep customization. No copycat energy.</h2>
          <p>Original PrestonHQ design system with cyber glass cards, safe embeds, and future monetization space.</p>
        </div>
      </section>
    </template>

    <template id="dashboard-template">
      <section class="dashboard-shell">
        <aside class="dash-sidebar reveal">
          <a class="brand compact" href="#/"><span class="brand-mark">P</span><strong>Profiles</strong></a>
          <button data-panel="overview" class="active">Overview</button>
          <button data-panel="profile">Profile editor</button>
          <button data-panel="theme">Theme editor</button>
          <button data-panel="cards">Custom cards</button>
          <button data-panel="effects">Effects</button>
          <button data-panel="analytics">Analytics</button>
          <button data-panel="admin">Admin</button>
          <a class="btn ghost small" href="#/u/me">View public</a>
        </aside>
        <div class="dash-main reveal delay-1">
          <div class="dash-topline">
            <div><span class="eyebrow"><span></span> Dashboard</span><h1>PrestonHQ Profiles</h1></div>
            <div class="dash-actions"><button class="btn ghost" id="saveProfileBtn">Save draft</button><button class="btn primary" id="publishProfileBtn">Publish</button></div>
          </div>
          <div id="dashboardPanel"></div>
        </div>
      </section>
    </template>

    <template id="profile-template">
      <section class="public-profile-shell" id="publicProfile"></section>
    </template>

    <script defer src="js/app.js?v=100"></script>
  </body>
</html>
