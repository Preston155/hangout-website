        <script type="application/json" id="embeddedVeltrixCommands">{
  "botName": "Veltrix",
  "subtitle": "City of Angels",
  "prefix": ".",
  "package": "veltrix",

  "categories": [
    {
      "id": "slash",

      "description": "Discord application commands — type / in chat.",

            {
              "name": "setup",
              "description": "Set the counting channel and optional start number."
            },
            {
              "name": "status",

            {

              "name": "permissions",
              "description": "Reapply City of Angels channel permissions."

            {
              "name": "audit",
              "description": "Audit risky setup channel permissions."

              "name": "delete-channels",

              "name": "delete-roles",

          "name": "shift",
          "type": "slash",

            {
              "name": "start",
              "description": "Start your staff shift."

              "name": "end",
              "description": "End your staff shift."

              "name": "status",
              "description": "View shift status for you or another staff member."

              "description": "View the staff points leaderboard."

          "name": "status",

          "description": "",
          "usage": ".status",
          "aliases": [
            "serverstatus",
            "server-status",
            "server"

          "permission": "Manage Server"

      "icon": "🎮",
      "description": "In-game session vote, start, and end controls.",

        {
          "name": "session",
          "type": "prefix",
          "usage": ".session <action>",

            {
              "name": "sv",
              "description": "Session Vote"

            {
              "name": "ss",
              "description": "Session Start"
            },
            {
              "name": "se",
              "description": "Session End"
            }
          ],
          "description": "Manage in-game session votes and roster.",
          "subcommands": [
            {
              "name": "help",
              "description": "Show session command help."
            },
            {
              "name": "vote",
              "description": "Open a session vote with Ready / Out buttons."

            {
              "name": "start",
              "description": "Start the active session."

            {
              "name": "end",
              "description": "End the current session."
            },
            {
              "name": "status",
              "description": "Show current session status and readiness."

            {
              "name": "list",
              "description": "Show who is Ready vs Out."
            }

          "permission": "Manage Server (vote/start/end)"

      ]

      "id": "systems",
      "label": "Automatic Systems",
      "icon": "⚙️",
      "description": "Features that run without a direct command.",
      "commands": [
        {
          "name": "Welcome System",
          "description": "Sends a branded welcome embed when a member joins City of Angels.",
          "type": "system"
        },
        {
          "name": "Leveling System",
          "description": "Members earn XP from messages. Use .level and .levels to view progress.",
          "type": "system"
        },
        {
          "name": "Ticket System",
          "description": "Support tickets via the /ticket-panel and button interactions.",

        },
        {
          "name": "Counting System",
          "description": "Members count up in a dedicated channel — wrong numbers or double-counts reset to 1. Use /counting or .counting to manage.",
          "type": "system"
        },
        {
          "name": "Reaction Roles",
          "description": "Self-assign roles using reaction-role panel buttons.",
          "type": "system"
        },
        {
          "name": "Mention Responder",
          "description": "Veltrix responds when @mentioned with helpful info.",
          "type": "system"
        },
        {
          "name": "Session Logs",
          "description": "Session activity logging for staff channels.",
          "type": "system"
        }
