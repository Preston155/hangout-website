<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="600" y1="0" x2="600" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0e0e10"/>
      <stop offset="1" stop-color="#14141a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 300) scale(380 260)">
      <stop stop-color="#2B7FFF" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#2B7FFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rgb" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF3B5C"/>
      <stop offset="0.2" stop-color="#FF8A3D"/>
      <stop offset="0.4" stop-color="#FFE14D"/>
      <stop offset="0.6" stop-color="#3DFF9A"/>
      <stop offset="0.8" stop-color="#2B7FFF"/>
      <stop offset="1" stop-color="#B56BFF"/>
    </linearGradient>
    <linearGradient id="v-metal" x1="500" y1="140" x2="700" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.5" stop-color="#A8B0BE"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="v-accent" x1="620" y1="160" x2="740" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5BA3FF"/>
      <stop offset="1" stop-color="#2B7FFF"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <ellipse cx="600" cy="300" rx="200" ry="180" fill="#2B7FFF" fill-opacity="0.1" filter="url(#soft)"/>

  <g transform="translate(600 300)">
    <path d="M-110 -120 L110 -120 L0 170 Z" fill="url(#v-metal)"/>
    <path d="M0 -120 L110 -120 L70 170 L0 170 Z" fill="url(#v-accent)"/>
  </g>

  <rect x="0" y="626" width="1200" height="4" fill="url(#rgb)"/>
</svg>
